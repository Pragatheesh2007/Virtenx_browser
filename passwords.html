<!DOCTYPE html>
<html>
<head>
    <title>Password Manager</title>
    <style>
        body { background: #0c0c0d; color: #e8eaed; font-family: -apple-system, BlinkMacSystemFont, Segoe UI, Roboto, Helvetica, Arial, sans-serif; padding: 60px 20px; max-width: 900px; margin: auto; line-height: 1.5; }
        .header { display: flex; align-items: center; gap: 15px; margin-bottom: 30px; }
        .back-btn { background: transparent; border: none; color: #8ab4f8; cursor: pointer; padding: 5px; display: flex; align-items: center; gap: 8px; font-size: 14px; }
        .back-btn:hover { text-decoration: underline; }
        h1 { font-size: 24px; font-weight: 500; margin: 0; }
        
        .search-bar { width: 100%; background: #202124; border: 1px solid #3c4043; border-radius: 8px; padding: 12px 16px; color: white; margin-bottom: 30px; outline: none; transition: border-color 0.2s; }
        .search-bar:focus { border-color: #8ab4f8; }

        .card { background: #1a1a1b; border-radius: 12px; border: 1px solid #292a2d; overflow: hidden; }
        .pwd-row { padding: 20px 24px; display: grid; grid-template-columns: 1.5fr 1.5fr 1fr auto; align-items: center; border-bottom: 1px solid #292a2d; gap: 15px; }
        .pwd-row:last-child { border-bottom: none; }
        .pwd-row.header-row { background: #202124; font-size: 13px; color: #9aa0a6; font-weight: 500; padding: 12px 24px; border-bottom: 1px solid #3c4043; }
        
        .url { color: #8ab4f8; font-weight: 500; font-size: 14px; text-decoration: none; word-break: break-all; }
        .user { font-size: 14px; color: #e8eaed; }
        .pwd-wrapper { display: flex; align-items: center; gap: 10px; }
        .pass { font-family: monospace; font-size: 14px; }
        
        .action-btn { background: #292a2d; border: 1px solid #3c4043; color: #9aa0a6; padding: 6px; border-radius: 6px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .action-btn:hover { color: white; background: #3c4043; }
        .delete-btn:hover { color: #f28b82; background: rgba(242, 139, 130, 0.1); border-color: #f28b82; }

        .empty-state { padding: 60px; text-align: center; color: #9aa0a6; }
    </style>
</head>
<body>
    <div class="header">
        <button class="back-btn" onclick="window.history.back()">
            <svg viewBox="0 0 24 24" style="width: 18px; fill: currentColor;"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
            Settings
        </button>
        <h1>Password Manager</h1>
    </div>

    <input type="text" class="search-bar" id="search" placeholder="Search saved passwords" oninput="renderPasswords()">

    <div class="card">
        <div class="pwd-row header-row">
            <div>SITE</div>
            <div>USERNAME</div>
            <div>PASSWORD</div>
            <div>ACTIONS</div>
        </div>
        <div id="pwd-list">
            <!-- Loaded via JS -->
        </div>
    </div>

    <script>
        let allPasswords = [];

        async function loadPasswords() {
            allPasswords = await window.electronAPI.getPasswords();
            renderPasswords();
        }

        function renderPasswords() {
            const query = document.getElementById('search').value.toLowerCase();
            const list = document.getElementById('pwd-list');
            list.innerHTML = '';

            const filtered = allPasswords.filter(p => 
                p.url.toLowerCase().includes(query) || 
                p.username.toLowerCase().includes(query)
            );

            if (filtered.length === 0) {
                list.innerHTML = '<div class="empty-state">No saved passwords found.</div>';
                return;
            }

            filtered.forEach((p, idx) => {
                const row = document.createElement('div');
                row.className = 'pwd-row';
                row.innerHTML = `
                    <div class="url" title="${p.url}">${new URL(p.url).hostname || p.url}</div>
                    <div class="user">${p.username}</div>
                    <div class="pwd-wrapper">
                        <input type="password" class="pass" style="background:transparent; border:none; color:white; width: 100px; outline:none;" value="${p.password}" readonly id="p-${idx}">
                    </div>
                    <div style="display: flex; gap: 8px;">
                        <button class="action-btn" onclick="toggleVisibility(${idx})" title="Show/Hide">
                            <svg viewBox="0 0 24 24" style="width: 16px; fill: currentColor;"><path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/></svg>
                        </button>
                        <button class="action-btn delete-btn" onclick="deletePwd(${idx})" title="Delete">
                            <svg viewBox="0 0 24 24" style="width: 16px; fill: currentColor;"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg>
                        </button>
                    </div>
                `;
                list.appendChild(row);
            });
        }

        function toggleVisibility(idx) {
            const input = document.getElementById(`p-${idx}`);
            input.type = input.type === 'password' ? 'text' : 'password';
        }

        async function deletePwd(idx) {
            if (confirm('Are you sure you want to delete this password?')) {
                const settings = await window.electronAPI.getSettings();
                settings.passwords.splice(idx, 1);
                await window.electronAPI.updateSettings(settings);
                loadPasswords();
            }
        }

        loadPasswords();
    </script>
</body>
</html>
